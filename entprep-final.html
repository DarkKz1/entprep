{q:"Выберите правильный вариант: I wish I ___ a car.",o:["have","has","had","having"],c:2,e:"I wish + Past Simple — нереальное желание в настоящем."},
{q:"Выберите правильный предлог: The lesson starts ___ 8 o'clock.",o:["in","on","at","to"],c:2,e:"At — для точного времени: at 8 o'clock, at noon, at midnight."},
{q:"Как переводится 'knowledge'?",o:["Мудрость","Знание","Навык","Опыт"],c:1,e:"Knowledge = знание. Wisdom = мудрость, skill = навык."},
{q:"Выберите правильный вариант: We ___ to the cinema tomorrow.",o:["go","goes","will go","went"],c:2,e:"Future Simple: will + V. Tomorrow — маркер будущего времени."},
{q:"Выберите правильный вариант: He ___ English for 5 years.",o:["studies","is studying","has been studying","studied"],c:2,e:"Present Perfect Continuous: has been + V-ing — действие с прошлого до сейчас."},
{q:"Выберите правильный вариант: ___ you like some tea?",o:["Do","Would","Are","Is"],c:1,e:"Would you like — вежливое предложение. Do you like — нравится ли."},
{q:"Как переводится 'achieve'?",o:["Избегать","Достигать","Получать","Проигрывать"],c:1,e:"Achieve = достигать. Achievement = достижение."},
{q:"Выберите правильный вариант: She ___ dinner when I called.",o:["cooks","cooked","was cooking","has cooked"],c:2,e:"Past Continuous: was/were + V-ing. Действие в процессе в прошлом."},
{q:"Выберите правильный предлог: I'm interested ___ science.",o:["on","at","in","about"],c:2,e:"Interested in — устойчивое словосочетание."},

{q:"Выберите правильный предлог: She is afraid ___ spiders.",o:["from","about","of","with"],c:2,e:"Afraid of — устойчивое сочетание. Бояться чего-то."},

function getQs(sid,n){
  if(sid==="reading"){
    const s=[...RP].sort(()=>Math.random()-.5);
    const need=Math.ceil(n/5);
    const ps=s.slice(0,need);
    const r=[];
    ps.forEach(p=>p.qs.forEach(q=>r.push({...q,pt:p.t,px:p.tx})));
    return r.slice(0,n);
  }
  const pool=QUESTION_POOLS[sid];
  if(!pool)return[];
  return [...pool].sort(()=>Math.random()-.5).slice(0,n);
}

// ==================== PROFILE SELECT SCREEN ====================
function ProfileSelect({onConfirm}){
  const[sel,setSel]=useState([]);
  const toggle=id=>{
    if(!ALL_PROFILES.find(p=>p.id===id).available)return;
    setSel(prev=>{
      if(prev.includes(id))return prev.filter(x=>x!==id);
      if(prev.length>=2)return prev;
      return[...prev,id];
    });
  };
  return(<div style={{padding:"0 20px 100px"}}>
    <div style={{background:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",borderRadius:22,padding:"26px 20px",marginBottom:18,textAlign:"center"}}>
      <div style={{fontSize:32,marginBottom:6}}>🎯</div>
      <h1 style={{fontSize:18,fontWeight:800,color:"#fff",margin:"0 0 6px",fontFamily:"'Unbounded',sans-serif"}}>Выбери профильные предметы</h1>
      <p style={{fontSize:11,color:"#94a3b8",margin:0}}>ЕНТ включает 2 профильных предмета по 40 заданий каждый</p>
      <p style={{fontSize:10,color:"#64748b",marginTop:3}}>Выбери ровно 2 предмета. Можно изменить в настройках.</p>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:18}}>
      {ALL_PROFILES.map(p=>{
        const active=sel.includes(p.id);
        const disabled=!p.available;
        return(<button key={p.id} onClick={()=>toggle(p.id)} disabled={disabled} style={{
          background:active?"rgba(255,107,53,0.15)":"#1e1e2e",
          border:active?"2px solid #FF6B35":"2px solid rgba(255,255,255,0.06)",
          borderRadius:14,padding:"16px 10px",cursor:disabled?"not-allowed":"pointer",
          textAlign:"center",transition:"all 0.2s",opacity:disabled?0.4:1,position:"relative"
        }}>
          {active&&<div style={{position:"absolute",top:8,right:8,width:20,height:20,borderRadius:10,background:"#FF6B35",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff"}}>✓</div>}
          <div style={{fontSize:28,marginBottom:6}}>{p.icon}</div>
          <div style={{fontSize:12,fontWeight:700,color:disabled?"#64748b":"#fff"}}>{p.name}</div>
          {p.available?<div style={{fontSize:9,color:"#94a3b8",marginTop:3}}>{p.pool} вопросов</div>
          :<div style={{fontSize:9,color:"#64748b",marginTop:3,fontStyle:"italic"}}>Скоро</div>}
        </button>);
      })}
    </div>
    <div style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginBottom:12}}>
      Выбрано: <span style={{color:"#FF6B35",fontWeight:700}}>{sel.length}</span> / 2
    </div>
    <button onClick={()=>onConfirm(sel)} disabled={sel.length!==2} style={{
      width:"100%",padding:"15px",background:sel.length===2?"linear-gradient(135deg,#FF6B35,#e85d26)":"#2a2a3e",
      border:"none",borderRadius:13,color:sel.length===2?"#fff":"#64748b",fontSize:14,fontWeight:700,
      cursor:sel.length===2?"pointer":"not-allowed",transition:"all 0.3s"
    }}>
      {sel.length===2?"Подтвердить выбор →":"Выберите 2 предмета"}
    </button>
  </div>);
}

function Test({sid,back,finish}){
  const sub=SUBS[sid]||ALL_PROFILES.find(p=>p.id===sid);
  const[qs]=useState(()=>getQs(sid,sub.cnt));const tot=qs.length;
  const[cur,setCur]=useState(0);const[ans,setAns]=useState({});const[show,setShow]=useState(false);
  const[tl,setTl]=useState(sid==="history"?30*60:20*60);const[fin,setFin]=useState(false);const tr=useRef(null);
  useEffect(()=>{tr.current=setInterval(()=>setTl(p=>{if(p<=1){clearInterval(tr.current);setFin(true);return 0;}return p-1;}),1000);return()=>{if(tr.current)clearInterval(tr.current);}},[]);
  const q=qs[cur];const cc=Object.entries(ans).filter(([i,a])=>qs[+i].c===a).length;
  const sel=idx=>{if(show)return;setAns(p=>({...p,[cur]:idx}));setShow(true);};
  const nxt=()=>{setShow(false);if(cur<tot-1){setCur(cur+1);}else{if(tr.current)clearInterval(tr.current);setFin(true);}};
  const fm=s=>`${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;
  const pct=tot?Math.round(cc/tot*100):0;const st=sid==="history"?30*60:20*60;
  if(fin)return(<div style={{padding:"0 20px 100px"}}>
    <div style={{background:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",borderRadius:22,padding:"28px 20px",textAlign:"center",marginBottom:18}}>
      <div style={{fontSize:42,marginBottom:4}}>{pct>=70?"🎉":pct>=50?"💪":"📚"}</div>
      <div style={{fontSize:36,fontWeight:800,fontFamily:"'Unbounded',sans-serif",color:pct>=70?"#22c55e":pct>=50?"#eab308":"#ef4444"}}>{pct}%</div>
      <div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>{cc} из {tot} • {fm(st-tl)}</div>
      <div style={{fontSize:10,color:pct>=70?"#22c55e":pct>=50?"#eab308":"#ef4444",marginTop:2}}>{pct>=70?"Отлично! Выше порога ✓":pct>=50?"Неплохо, но нужно повторить":"Нужно больше подготовки"}</div>
    </div>
    <h3 style={{fontSize:13,fontWeight:700,color:"#fff",margin:"0 0 8px",fontFamily:"'Unbounded',sans-serif"}}>Разбор ответов</h3>
    {qs.map((q,i)=>{const ua=ans[i];const ok=ua===q.c;return(
      <div key={i} style={{background:"#1e1e2e",borderRadius:11,padding:"10px 11px",marginBottom:5,borderLeft:`3px solid ${ok?"#22c55e":ua!==undefined?"#ef4444":"#64748b"}`}}>
        <div style={{fontSize:11,color:"#e2e8f0",marginBottom:2,fontWeight:500}}>{i+1}. {q.q}</div>
        {ua!==undefined?(<div style={{fontSize:10,color:ok?"#22c55e":"#ef4444"}}>{ok?"✓":"✗"} {q.o[ua]}{!ok&&<span style={{color:"#22c55e"}}> → {q.o[q.c]}</span>}</div>):(<div style={{fontSize:10,color:"#64748b"}}>Пропущен → {q.o[q.c]}</div>)}
        <div style={{fontSize:9,color:"#94a3b8",marginTop:3,lineHeight:1.6,background:"rgba(14,165,233,0.05)",padding:"5px 7px",borderRadius:6}}><span style={{color:"#0EA5E9",fontWeight:600}}>💡 </span>{q.e}</div>
      </div>
    );})}
    <button onClick={()=>finish({su:sid,co:cc,to:tot,sc:pct,dt:new Date().toLocaleDateString("ru-RU"),tm:st-tl})} style={{width:"100%",padding:"14px",marginTop:12,background:sub.color,color:"#fff",border:"none",borderRadius:12,fontSize:13,fontWeight:700,cursor:"pointer"}}>На главную</button>
  </div>);
  const isR=sid==="reading"&&q.px;
  return(<div style={{padding:"0 20px 100px"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
      <button onClick={back} style={{background:"#1e1e2e",border:"1px solid rgba(255,255,255,0.06)",borderRadius:9,padding:"7px 11px",cursor:"pointer",color:"#fff",fontSize:10,fontWeight:600}}>← Выйти</button>
      <div style={{background:tl<120?"rgba(239,68,68,0.15)":"#1e1e2e",border:`1px solid ${tl<120?"rgba(239,68,68,0.3)":"rgba(255,255,255,0.06)"}`,borderRadius:9,padding:"7px 11px",fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:tl<120?"#ef4444":"#fff"}}>{fm(tl)}</div>
    </div>
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
        <span style={{fontSize:10,color:"#94a3b8"}}>Вопрос {cur+1} из {tot}</span>
        <span style={{fontSize:10,color:"#22c55e",fontFamily:"'JetBrains Mono',monospace"}}>{cc} верных</span>
      </div>
      <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:2}}><div style={{height:"100%",width:`${((cur+1)/tot)*100}%`,background:"linear-gradient(90deg,#FF6B35,#0EA5E9)",borderRadius:2,transition:"width 0.3s"}}/></div>
    </div>
    {isR&&<div style={{background:"#1e1e2e",borderRadius:11,padding:"10px 12px",marginBottom:10,border:"1px solid rgba(139,92,246,0.2)"}}>
      <div style={{fontSize:10,fontWeight:600,color:"#8B5CF6",marginBottom:3}}>📖 {q.pt}</div>
      <div style={{fontSize:10,color:"#cbd5e1",lineHeight:1.7}}>{q.px}</div>
    </div>}
    <div style={{background:"#1e1e2e",borderRadius:14,padding:"18px 14px",marginBottom:10,border:"1px solid rgba(255,255,255,0.06)"}}>
      <div style={{fontSize:13,fontWeight:600,color:"#fff",lineHeight:1.6}}>{q.q}</div>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {q.o.map((opt,idx)=>{
        const picked=ans[cur]===idx;const correct=q.c===idx;
        let bg="#1e1e2e",bd="1px solid rgba(255,255,255,0.06)",tc="#e2e8f0";
        if(show&&correct){bg="rgba(34,197,94,0.12)";bd="1px solid rgba(34,197,94,0.4)";tc="#22c55e";}
        else if(show&&picked&&!correct){bg="rgba(239,68,68,0.12)";bd="1px solid rgba(239,68,68,0.4)";tc="#ef4444";}
        else if(picked){bg="rgba(255,107,53,0.12)";bd="1px solid rgba(255,107,53,0.4)";tc="#FF6B35";}
        return(<button key={idx} onClick={()=>sel(idx)} style={{display:"flex",alignItems:"center",background:bg,border:bd,borderRadius:11,padding:"12px",cursor:show?"default":"pointer",textAlign:"left",transition:"all 0.2s"}}>
          <div style={{width:24,height:24,borderRadius:12,border:`2px solid ${tc}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:tc,flexShrink:0,marginRight:10}}>{String.fromCharCode(65+idx)}</div>
          <span style={{fontSize:12,color:tc,fontWeight:picked?600:400}}>{opt}</span>
        </button>);
      })}
    </div>
    {show&&<div style={{background:"rgba(14,165,233,0.06)",border:"1px solid rgba(14,165,233,0.15)",borderRadius:11,padding:"10px 12px",marginTop:10}}>
      <div style={{fontSize:10,color:"#94a3b8",lineHeight:1.7}}><span style={{color:"#0EA5E9",fontWeight:600}}>💡 </span>{q.e}</div>
    </div>}
    {show&&<button onClick={nxt} style={{width:"100%",padding:"13px",marginTop:10,background:"linear-gradient(135deg,#FF6B35,#e85d26)",color:"#fff",border:"none",borderRadius:12,fontSize:13,fontWeight:700,cursor:"pointer"}}>{cur<tot-1?"Следующий →":"Завершить тест"}</button>}
  </div>);
}

      <div style={{fontSize:8,color:"#4a5568",marginTop:1}}>{UNIS.length} вузов • Формат ЕНТ 2025/2026 • 140 баллов макс.</div>
    </div>
  </div>);
}


// ==================== MAIN APP ====================
  const saved=loadData();
  const[scr,setScr]=useState("home");
  const[sid,setSid]=useState(null);
  const[hist,setHist]=useState(saved?.hist||[]);
  const[st,setSt]=useState(saved?.st||{exp:true,tmr:true,shf:true});
  const[tab,setTab]=useState("home");
  const[prof,setProf]=useState(saved?.prof||[]);
  useEffect(()=>{saveData({hist,st,prof,lastLogin:new Date().toISOString()});},[hist,st,prof]);
  const nav=(t,s)=>{if(t==="test"&&s){setSid(s);setScr("test")}else if(t==="calc")setScr("calc");else setScr("home")};
  const fin=r=>{setHist(p=>[...p,r]);setScr("home");setTab("home")};
  const ct=t=>{setTab(t);setScr(t==="prog"?"prog":t==="set"?"set":"home")};
  const confirmProfile=sel=>{setProf(sel);setScr("home");setTab("home")};
  const resetProfile=()=>{setProf([]);setScr("profile");setTab("home")};

  const needProfile=prof.length===0&&scr!=="profile";

  return(<div style={{minHeight:"100vh",background:"#0f0f1a",fontFamily:"'Segoe UI',-apple-system,sans-serif",maxWidth:480,margin:"0 auto",position:"relative"}}>
    <style>{`@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');*{box-sizing:border-box;margin:0;padding:0}input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#FF6B35;cursor:pointer;border:3px solid #fff;box-shadow:0 0 8px rgba(255,107,53,0.4)}input[type="range"]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#FF6B35;cursor:pointer;border:3px solid #fff}button{font-family:inherit}@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}`}</style>
    <div style={{padding:"11px 20px",display:"flex",alignItems:"center",justifyContent:"center",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
      <div style={{fontSize:13,fontWeight:800,fontFamily:"'Unbounded',sans-serif"}}><span style={{color:"#FF6B35"}}>ENT</span><span style={{color:"#0EA5E9"}}>prep</span><span style={{fontSize:8,color:"#64748b",marginLeft:5}}>v5 • {MQ.length+RP.length*5+HQ.length+GEO.length+ENG.length}q</span></div>
    </div>
    <div style={{paddingTop:10,animation:"fadeIn 0.25s ease"}}>
      {needProfile&&<ProfileSelect onConfirm={confirmProfile}/>}
      {!needProfile&&scr==="profile"&&<ProfileSelect onConfirm={confirmProfile}/>}
      {!needProfile&&scr==="home"&&<Home nav={nav} hist={hist} prof={prof}/>}
      {!needProfile&&scr==="test"&&sid&&<Test sid={sid} back={()=>{setScr("home");setTab("home")}} finish={fin}/>}
      {!needProfile&&scr==="calc"&&<Calc back={()=>{setScr("home");setTab("home")}}/>}
      {!needProfile&&scr==="prog"&&<Progress hist={hist} prof={prof}/>}
      {!needProfile&&scr==="set"&&<Settings st={st} upd={setSt} hist={hist} clr={()=>setHist([])} onResetProfile={resetProfile}/>}
    </div>
    {!needProfile&&scr!=="test"&&scr!=="profile"&&<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"linear-gradient(180deg,transparent,#0f0f1a 20%)",padding:"12px 20px 8px",display:"flex",justifyContent:"space-around"}}>
      {[{id:"home",l:"Главная",ic:"🏠"},{id:"prog",l:"Прогресс",ic:"📊"},{id:"set",l:"Настройки",ic:"⚙️"}].map(t=>(
        <button key={t.id} onClick={()=>ct(t.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",background:"none",border:"none",cursor:"pointer",padding:"4px 12px",borderRadius:10,transition:"all 0.2s",transform:tab===t.id?"scale(1.05)":"none"}}>
          <span style={{fontSize:18}}>{t.ic}</span>
          <span style={{fontSize:8,fontWeight:600,color:tab===t.id?"#FF6B35":"#64748b",marginTop:2}}>{t.l}</span>
        </button>
      ))}
    </div>}
  </div>);
}
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
