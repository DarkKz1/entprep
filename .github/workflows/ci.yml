name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: entprep-app/package-lock.json

      - name: Install dependencies
        working-directory: entprep-app
        run: npm ci

      - name: Build
        working-directory: entprep-app
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
