<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8C5A"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Decorative glows -->
  <circle cx="900" cy="80" r="220" fill="#FF6B35" opacity="0.05"/>
  <circle cx="120" cy="420" r="180" fill="#0EA5E9" opacity="0.05"/>
  <circle cx="512" cy="250" r="300" fill="#FF6B35" opacity="0.02"/>

  <!-- Logo -->
  <text x="512" y="175" text-anchor="middle" font-family="'Arial Black',Arial,Helvetica,sans-serif" font-weight="900" font-size="96" letter-spacing="-2">
    <tspan fill="url(#accent)">ENT</tspan><tspan fill="url(#blue)">prep</tspan>
  </text>

  <!-- Accent bar under logo -->
  <rect x="362" y="195" width="300" height="4" rx="2" fill="url(#blue)" opacity="0.4"/>

  <!-- Tagline -->
  <text x="512" y="250" text-anchor="middle" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="28" fill="#e2e8f0" font-weight="600">
    Бесплатная подготовка к ЕНТ
  </text>

  <!-- Divider -->
  <rect x="212" y="280" width="600" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Stats -->
  <text x="262" y="345" text-anchor="middle" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="40" fill="#FF6B35" font-weight="800">15 000+</text>
  <text x="262" y="375" text-anchor="middle" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="15" fill="#94a3b8">вопросов</text>

  <text x="512" y="345" text-anchor="middle" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="40" fill="#0EA5E9" font-weight="800">13</text>
  <text x="512" y="375" text-anchor="middle" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="15" fill="#94a3b8">предметов</text>

  <text x="762" y="345" text-anchor="middle" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="40" fill="#22c55e" font-weight="800">140</text>
  <text x="762" y="375" text-anchor="middle" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="15" fill="#94a3b8">баллов макс.</text>

  <!-- Bottom features -->
  <text x="512" y="440" text-anchor="middle" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="17" fill="#64748b">
    Симуляция экзамена  ·  ИИ-объяснения  ·  Дуэли  ·  Калькулятор грантов
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="490" width="1024" height="10" fill="url(#accent)"/>
</svg>
