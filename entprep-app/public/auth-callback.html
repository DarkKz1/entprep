<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ENTprep — Signing in...</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #0f0f1a; color: #fff; font-family: system-ui; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.15); border-top-color: #FF6B35; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div style="text-align:center">
    <div class="spinner" style="margin:0 auto 16px"></div>
    <div>Signing in...</div>
  </div>
  <script>
    // This page acts as a redirect proxy for native OAuth.
    // Supabase redirects here after auth, then we forward to the native app.
    const params = window.location.search + window.location.hash;
    const nativeUrl = 'kz.entprep.app://auth' + params;

    // Try to open native app
    window.location.href = nativeUrl;

    // Fallback: if not in native app, redirect to main page (web flow)
    setTimeout(() => {
      window.location.href = '/' + window.location.hash;
    }, 2000);
  </script>
</body>
</html>
