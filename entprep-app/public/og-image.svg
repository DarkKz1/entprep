<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#e85d26"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="rgba(255,107,53,0.06)"/>
  <circle cx="150" cy="500" r="150" fill="rgba(14,165,233,0.06)"/>
  <!-- Logo -->
  <text x="600" y="220" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="72" font-weight="800" letter-spacing="-1">
    <tspan fill="#FF6B35">ENT</tspan><tspan fill="#0EA5E9">prep</tspan>
  </text>
  <!-- Tagline -->
  <text x="600" y="290" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="32" fill="#e2e8f0" font-weight="600">
    Бесплатная подготовка к ЕНТ
  </text>
  <!-- Stats bar -->
  <rect x="200" y="340" width="800" height="1" fill="rgba(255,255,255,0.08)"/>
  <!-- Stats -->
  <text x="300" y="410" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="36" fill="#FF6B35" font-weight="800">15 000+</text>
  <text x="300" y="445" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#94a3b8">вопросов</text>
  <text x="600" y="410" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="36" fill="#0EA5E9" font-weight="800">13</text>
  <text x="600" y="445" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#94a3b8">предметов</text>
  <text x="900" y="410" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="36" fill="#22c55e" font-weight="800">140</text>
  <text x="900" y="445" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" fill="#94a3b8">баллов макс.</text>
  <!-- Bottom tagline -->
  <text x="600" y="540" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" fill="#64748b">Адаптивное обучение  ·  Симуляция экзамена  ·  Калькулятор грантов</text>
  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>
