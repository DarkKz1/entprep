<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161624"/>
      <stop offset="100%" stop-color="#0C0C14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C5A"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A9A8C"/>
      <stop offset="100%" stop-color="#2AB5A5"/>
    </linearGradient>
  </defs>
  <!-- Background — app's real dark theme -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- ENT text — same layout as original, orange EN + teal T -->
  <text x="256" y="300" text-anchor="middle" font-family="'Arial Black',Arial,Helvetica,sans-serif" font-weight="900" font-size="180" letter-spacing="-8">
    <tspan fill="url(#accent)">EN</tspan><tspan fill="url(#teal)">T</tspan>
  </text>
  <!-- Accent bar — teal -->
  <rect x="110" y="340" width="292" height="6" rx="3" fill="url(#teal)" opacity="0.5"/>
  <!-- Tagline -->
  <text x="256" y="400" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="42" fill="#94a3b8" letter-spacing="8">PREP</text>
</svg>
