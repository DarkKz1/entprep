<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b4d6e"/>
      <stop offset="100%" stop-color="#2a3a55"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C5A"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <circle cx="180" cy="180" r="160" fill="#FF6B35" opacity="0.06"/>
  <circle cx="380" cy="380" r="120" fill="#0EA5E9" opacity="0.06"/>
  <!-- ENT text -->
  <text x="256" y="300" text-anchor="middle" font-family="'Arial Black',Arial,Helvetica,sans-serif" font-weight="900" font-size="180" letter-spacing="-8">
    <tspan fill="url(#accent)">EN</tspan><tspan fill="url(#blue)">T</tspan>
  </text>
  <!-- Accent bar -->
  <rect x="110" y="340" width="292" height="6" rx="3" fill="url(#blue)" opacity="0.5"/>
  <!-- Tagline -->
  <text x="256" y="400" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="42" fill="#94a3b8" letter-spacing="8">PREP</text>
</svg>
